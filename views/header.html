<!DOCTYPE html>
<html lang="{{ .Locale }}" translate="no">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" content="notranslate">
    <title>{{ if .PageTitle }}{{ .PageTitle }} | {{ end }}{{ index .I18n "site_title_suffix" }}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet" />

    <!-- Tailwind CSS (Local Build) -->
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
        }

        @media (min-width: 640px) and (max-width: 767px) {
            .weather-info-box {
                max-width: 62% !important;
                max-height: calc(100% - 0.9rem) !important;
                padding: 0.22rem 0.38rem !important;
                font-size: 0.6rem !important;
                line-height: 1.08 !important;
                gap: 0 !important;
            }

            .weather-info-box p,
            .weather-info-box td {
                line-height: 1.05 !important;
            }
        }

        @media (max-width: 340px) {
            .weather-info-box {
                max-width: 37% !important;
                padding: 0.18rem 0.33rem !important;
                font-size: 0.38rem !important;
                line-height: 1.15 !important;
                max-height: calc(100% - 0.45rem);
            }

            .weather-info-box p,
            .weather-info-box td {
                line-height: 1.1 !important;
            }

            .weather-info-table {
                table-layout: fixed;
            }

            .weather-info-table td:first-child {
                width: 46%;
            }

            .weather-info-table td:last-child {
                width: 54%;
            }

            .weather-info-box .water-quality-label {
                gap: 0.1rem;
            }
        }

        .water-quality-help::-webkit-details-marker {
            display: none;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>



    {{ if .GAEnabled }}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ .GAMeasurementID }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ .GAMeasurementID }}');
    </script>
    {{ end }}
</head>

<body class="min-h-screen bg-gray-100">
