<!DOCTYPE html>
<html lang="{{ .Locale }}" translate="no">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" content="notranslate">
    <title>{{ if .PageTitle }}{{ .PageTitle }} | {{ end }}{{ index .I18n "site_title_suffix" }}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet" />

    <!-- Tailwind CSS (Local Build) -->
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
        }

        @media (min-width: 640px) and (max-width: 767px) {
            .weather-info-box {
                max-width: 62% !important;
                max-height: calc(100% - 0.9rem) !important;
                padding: 0.22rem 0.38rem !important;
                font-size: 0.6rem !important;
                line-height: 1.08 !important;
                gap: 0 !important;
            }

            .weather-info-box p,
            .weather-info-box td {
                line-height: 1.05 !important;
            }
        }

        @media (max-width: 340px) {
            .weather-info-box {
                max-width: 37% !important;
                padding: 0.18rem 0.33rem !important;
                font-size: 0.38rem !important;
                line-height: 1.15 !important;
                max-height: calc(100% - 0.45rem);
            }

            .weather-info-box p,
            .weather-info-box td {
                line-height: 1.1 !important;
            }

            .weather-info-table {
                table-layout: fixed;
            }

            .weather-info-table td:first-child {
                width: 46%;
            }

            .weather-info-table td:last-child {
                width: 54%;
            }

            .weather-info-box .water-quality-label {
                gap: 0.1rem;
            }
        }

        .water-quality-help::-webkit-details-marker {
            display: none;
        }

        .webcam-title-overlay {
            max-width: calc(100% - 0.9rem);
        }

        .webcam-title-box {
            max-width: calc(100% - 4.4rem);
        }

        .webcam-title-box h2 {
            font-size: clamp(0.82rem, 2.25vw, 1.95rem);
            line-height: 1.08;
        }

        .webcam-zoom-box svg {
            width: 32px !important;
            height: 32px !important;
        }

        .map-title-overlay {
            max-width: calc(100% - 0.9rem);
            z-index: 1200;
        }

        .map-title-box h1 {
            font-size: clamp(0.84rem, 2.35vw, 1.95rem);
            line-height: 1.1;
        }

        .webcam-big-back-btn svg {
            width: 32px;
            height: 32px;
        }

        @media (max-width: 767px) {
            .webcam-title-box {
                max-width: calc(100% - 3.7rem);
            }

            .webcam-title-box h2,
            .map-title-box h1 {
                font-size: clamp(0.76rem, 3.7vw, 1.2rem);
            }
        }

        @media (max-width: 380px) {
            .webcam-title-overlay {
                gap: 0.3rem !important;
                max-width: calc(100% - 0.55rem);
            }

            .webcam-title-box {
                max-width: calc(100% - 3.1rem);
                padding: 0.36rem 0.5rem !important;
            }

            .webcam-zoom-box {
                padding-left: 0.45rem !important;
                padding-right: 0.45rem !important;
            }

            .webcam-zoom-box svg {
                width: 24px !important;
                height: 24px !important;
            }

            .home-map-frame {
                height: 540px !important;
                min-height: 540px !important;
            }

            .home-map-canvas {
                height: 620px !important;
                min-height: 620px !important;
                margin-top: -40px !important;
            }

            .map-title-overlay {
                max-width: calc(100% - 0.55rem);
            }

            .map-title-box {
                padding: 0.36rem 0.5rem !important;
            }

            .map-title-box h1 {
                font-size: 0.75rem !important;
                line-height: 1.14 !important;
            }
        }
    </style>
    {{ if .GAEnabled }}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ .GAMeasurementID }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', {{ printf "%q" .GAMeasurementID }});
    </script>
    {{ end }}
</head>

<body class="min-h-screen bg-gray-100">
