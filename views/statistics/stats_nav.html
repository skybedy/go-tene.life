    <a href="{{ localeURL .Locale "/statistics/weekly" }}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-xl border shadow-sm transition {{ if eq .StatsSection "weekly" }}border-blue-600 bg-blue-600 text-white shadow-blue-200/70{{ else }}border-slate-300 bg-slate-100/90 text-slate-800 hover:border-blue-400 hover:bg-white hover:text-blue-700{{ end }}">{{ index .I18n "weekly_short" }}</a>
    <a href="{{ localeURL .Locale "/statistics/monthly" }}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-xl border shadow-sm transition {{ if eq .StatsSection "monthly" }}border-blue-600 bg-blue-600 text-white shadow-blue-200/70{{ else }}border-slate-300 bg-slate-100/90 text-slate-800 hover:border-blue-400 hover:bg-white hover:text-blue-700{{ end }}">{{ index .I18n "monthly_short" }}</a>
    <a href="{{ localeURL .Locale "/statistics/recent" }}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-xl border shadow-sm transition {{ if eq .StatsSection "recent" }}border-blue-600 bg-blue-600 text-white shadow-blue-200/70{{ else }}border-slate-300 bg-slate-100/90 text-slate-800 hover:border-blue-400 hover:bg-white hover:text-blue-700{{ end }}">{{ index .I18n "recent_short" }}</a>
