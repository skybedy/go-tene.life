<!DOCTYPE html>
<html lang="{{ .Locale }}" translate="no">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" content="notranslate">
    <title>{{ index .I18n "webcam_big_title" }}</title>
    <link rel="stylesheet" href="/css/app.css">
    {{ if .GAEnabled }}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ .GAMeasurementID }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ .GAMeasurementID }}');
    </script>
    {{ end }}
</head>

<body class="m-0 overflow-x-hidden overflow-y-auto">
    <div class="relative w-full leading-none">
        <img src="{{ if .WebcamImageURL }}{{ .WebcamImageURL }}{{ else }}/webcam/image.jpg{{ end }}" alt="{{ index .I18n "webcam_big_alt" }}" class="block w-full h-auto">

        <a href="{{ localeURL .Locale "/" }}"
            class="absolute top-4 left-4 bg-black/60 hover:bg-white/20 text-white p-2 rounded-full backdrop-blur-md transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
    </div>
</body>

</html>
