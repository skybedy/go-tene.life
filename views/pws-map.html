{{ template "header.html" . }}
{{ template "nav.html" . }}

<main>
    <div class="mx-auto w-full sm:w-3/4 p-3 sm:p-4 md:p-6 lg:p-8">
        <div class="bg-white/30 rounded-2xl shadow-lg backdrop-blur-sm border border-gray-300 p-4 sm:p-5 md:p-6 lg:p-7">
            <h1 class="text-lg sm:text-xl md:text-2xl lg:text-3xl font-bold text-gray-800 mb-2">
                {{ index .I18n "tenerife_temperatures" }}
            </h1>
            <p class="text-gray-600 text-xs sm:text-sm md:text-base mb-3 sm:mb-4">
                {{ index .I18n "pws_map_subtitle" }}
            </p>
            <p id="pwsLastUpdate" class="text-gray-700 text-xs sm:text-sm mb-3 sm:mb-4">
                {{ index .I18n "pws_last_update" }}: -
            </p>
            <div id="pwsMap" class="w-full h-[320px] sm:h-[500px] rounded-xl border border-gray-300" style="min-height: 320px;"></div>
            <p id="pwsMapMessage" class="hidden mt-3 text-sm text-gray-700"></p>
        </div>
    </div>
</main>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    window.pwsMapI18n = {
        lastUpdateLabel: {{ printf "%q" (index .I18n "pws_last_update") }},
        noData: {{ printf "%q" (index .I18n "pws_no_data") }},
        observedAt: {{ printf "%q" (index .I18n "pws_observed_at") }},
        fetchedAt: {{ printf "%q" (index .I18n "pws_fetched_at") }},
        stale: {{ printf "%q" (index .I18n "pws_stale") }},
        invalid: {{ printf "%q" (index .I18n "pws_invalid") }}
    };
</script>
<script src="/js/pws-map.js"></script>

{{ template "footer.html" . }}
